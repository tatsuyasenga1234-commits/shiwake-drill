const ALL_ACCOUNTS = Array.from(new Set(ACCOUNT_GROUPS.flat()));
const SEED = [
  // ── 一般商品売買 ──
  { id: "s04", topic: "一般商品売買", q: "商品400個。期首300個@700円、当期仕入200個@800円、400個を@1,000円で掛販売（売上原価対立法・先入先出）。売上と原価振替を答えよ。", debit: [D("売掛金", 400000), D("売上原価", 290000)], credit: [D("売上", 400000), D("商品", 290000)], memo: "売上原価対立法は販売の都度、売上と同時に原価を商品から売上原価へ振り替える。先入先出なので古い在庫から払い出す。" },
  { id: "s04d", topic: "一般商品売買", q: "期末商品帳簿棚卸高200,000円、実地棚卸高185,000円。差は減耗（原価性あり）。棚卸減耗損を計上する。", debit: [D("棚卸減耗損", 15000)], credit: [D("繰越商品", 15000)], memo: "帳簿数量と実地数量の差が棚卸減耗。原価性があれば売上原価の内訳として処理する。" },
  { id: "s04e", topic: "一般商品売買", q: "期末商品（実地185,000円）に収益性の低下。正味売却価額が170,000円となり商品評価損を計上する。", debit: [D("商品評価損", 15000)], credit: [D("繰越商品", 15000)], memo: "正味売却価額が原価を下回った分は商品評価損。収益性が下がった在庫を時価まで切り下げる（低価法）。" },

  // ── 特殊商品売買 ──
  { id: "s05", topic: "特殊商品売買", q: "委託販売のため商品300,000円を積送した（手許商品区分法・その都度法）。", debit: [D("積送品", 300000)], credit: [D("仕入", 300000)], memo: "委託販売では、商品を送っただけでは売上にならない（所有権は委託者に残る）。手許から離れた分を仕入から積送品へ振り替え、販売されるまで資産として持つ。" },
  { id: "s06", topic: "特殊商品売買", q: "受託者から委託品が500,000円で販売された旨の仕切精算書が届いた（売上計上、代金は積送売掛金）。", debit: [D("積送売掛金", 500000)], credit: [D("積送品売上", 500000)], memo: "委託販売の売上計上日は「受託者が顧客に販売した日」。仕切精算書の到着でそれが分かるため、このタイミングで積送品売上を計上する。" },
  { id: "s07", topic: "特殊商品売買", q: "割賦販売により商品を600,000円で販売、代金は月賦で受け取る（販売基準）。", debit: [D("割賦売掛金", 600000)], credit: [D("割賦売上", 600000)], memo: "割賦販売も原則は通常の販売と同じ販売基準。引き渡した時点で代金が未回収でも全額を売上計上する。回収は後の問題。" },
  { id: "s08", topic: "特殊商品売買", q: "試用販売で送付していた商品（売価200,000円）について、得意先から買取りの意思表示があった（対照勘定法・売上計上）。", debit: [D("売掛金", 200000)], credit: [D("試用品売上", 200000)], memo: "試用販売は「買う」と意思表示された時が売上計上日。それまでは相手が買うか不明なので売上にしない。" },

  // 委託販売（積送）
  { id: "s51", topic: "特殊商品売買", q: "委託販売のため商品400,000円を積送し、発送費20,000円を現金で支払った（積送諸掛は積送品原価に含めず積送諸掛で処理）。", debit: [D("積送品", 400000), D("積送諸掛", 20000)], credit: [D("仕入", 400000), D("現金", 20000)], memo: "積送時は仕入→積送品へ振替。発送費（積送諸掛）は商品原価に含めず費用として別建てする方法を採っている。" },
  { id: "s52", topic: "特殊商品売買", q: "受託者から仕切精算書を受領。売上600,000円、受託者手数料60,000円を差引いた手取り540,000円が委託者の手取り（売上総額計上、手数料は積送諸掛、手取りは積送売掛金）。", debit: [D("積送売掛金", 540000), D("積送諸掛", 60000)], credit: [D("積送品売上", 600000)], memo: "売上は手数料を引く前の総額で計上するのがポイント。手数料は販売のための費用（積送諸掛）、手取りだけが債権になる。" },
  { id: "s53", topic: "特殊商品売買", q: "委託販売（その都度法）。積送品（原価320,000円）が販売されたため、対応する積送品原価を売上原価に振り替える。", debit: [D("仕入", 320000)], credit: [D("積送品", 320000)], memo: "その都度法では、商品が売れるたびに対応する原価を積送品から仕入（売上原価）へ戻す。売上と原価を都度対応させる考え方。" },

  // 受託販売
  { id: "s54", topic: "特殊商品売買", q: "受託販売。委託者から販売委託の商品を受け取った（保管を開始した）。仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "受託品は預かっているだけで自社の資産ではない。買い取ったわけでもないので、受け入れただけでは仕訳しない。" },
  { id: "s54b", topic: "特殊商品売買", q: "受託販売。委託品を引き取り、引取運賃15,000円を現金で立替払いした（受託販売勘定で処理）。", debit: [D("受託販売", 15000)], credit: [D("現金", 15000)], memo: "受入れ自体は仕訳なしだが、受託者が立て替えた費用は委託者に請求できる債権。受託販売勘定（委託者との貸借をまとめる勘定）で処理する。" },
  { id: "s55", topic: "特殊商品売買", q: "受託販売。預かっていた委託品を300,000円で販売し、代金は現金で受け取った（受託販売勘定で処理）。", debit: [D("現金", 300000)], credit: [D("受託販売", 300000)], memo: "受託者にとって、売った商品は他人（委託者）のもの。売上は自分のものにならず、受託販売勘定で委託者への預りとして処理する。" },

  // 割賦販売
  { id: "s56", topic: "特殊商品売買", q: "割賦販売で商品を800,000円（原価600,000円）で販売、代金は8回の月賦。販売基準・売上原価対立法で売上と原価振替を答えよ。", debit: [D("割賦売掛金", 800000), D("売上原価", 600000)], credit: [D("割賦売上", 800000), D("商品", 600000)], memo: "割賦も販売基準なら通常販売と同じ。引渡時に全額を売上計上し、対立法なので同時に原価も振り替える。" },
  { id: "s57", topic: "特殊商品売買", q: "割賦金の第1回分100,000円を現金で回収した（販売基準）。", debit: [D("現金", 100000)], credit: [D("割賦売掛金", 100000)], memo: "販売基準ではすでに売上計上済み。回収は債権（割賦売掛金）が現金に変わるだけで、新たな収益は生じない。" },

  // 試用販売
  { id: "s58", topic: "特殊商品売買", q: "試用販売（対照勘定法）。商品（売価250,000円）を試用のため得意先に送付した。", debit: [D("試用販売契約", 250000)], credit: [D("試用仮売上", 250000)], memo: "対照勘定法は、試送した事実を売価で備忘記録する方法。まだ売上ではないので、対になる勘定（試用販売契約／試用仮売上）で記録だけしておく。" },
  { id: "s59", topic: "特殊商品売買", q: "試用販売（対照勘定法）。上記の試用品（売価250,000円）について買取りの意思表示があり売上計上。対照勘定の戻しと売上計上の両方を答えよ。", debit: [D("試用仮売上", 250000), D("売掛金", 250000)], credit: [D("試用販売契約", 250000), D("試用品売上", 250000)], memo: "買取りの意思表示で初めて売上。発送時に記録した対照勘定を逆仕訳で消し、同時に本当の売上を計上する2段構えになる。" },

  // 未着品売買
  { id: "s60", topic: "特殊商品売買", q: "未着品売買。貨物代表証券500,000円を取得し、代金は掛けとした。", debit: [D("未着品", 500000)], credit: [D("買掛金", 500000)], memo: "貨物代表証券（船荷証券など）は、現品が届く前の「商品を受け取る権利」。これを取得した段階で未着品として資産計上する。" },
  { id: "s61", topic: "特殊商品売買", q: "未着品（原価500,000円）を貨物代表証券のまま620,000円で転売し、代金は掛け。売上計上と原価振替（その都度法・対立法的処理）を答えよ。", debit: [D("未着品売掛金", 620000), D("仕入", 500000)], credit: [D("未着品売上", 620000), D("未着品", 500000)], memo: "証券のまま転売しても売上は売上。売れた分の未着品原価を仕入（売上原価）へ振り替えて、収益と費用を対応させる。" },
  { id: "s62", topic: "特殊商品売買", q: "未着品（原価500,000円）の貨物代表証券につき現品を引き取り、引取運賃10,000円を現金で支払った（引取運賃は未着品に算入）。", debit: [D("仕入", 510000)], credit: [D("未着品", 500000), D("現金", 10000)], memo: "現品を引き取ったら未着品を仕入へ振替。引取運賃は商品を使える状態にするための費用なので原価に加える（500,000＋10,000＝510,000）。" },

  // 予約販売
  { id: "s63", topic: "特殊商品売買", q: "予約販売。商品の予約を受け、予約金150,000円を現金で受け取った。", debit: [D("現金", 150000)], credit: [D("予約金", 150000)], memo: "予約金はまだ商品を渡していないので売上にできない。後で商品を渡す義務（負債）として予約金で受けておく。" },
  { id: "s64", topic: "特殊商品売買", q: "予約販売。予約済み商品（予約金150,000円受領済）を引き渡し、売上を計上した。", debit: [D("予約金", 150000)], credit: [D("売上", 150000)], memo: "商品を引き渡して初めて収益が確定する。預かっていた予約金（負債）を売上に振り替える。" },

  // ── 特殊商品売買（さらに追加） ──
  { id: "ss01", topic: "特殊商品売買", q: "委託販売（手許商品区分法・期末一括法）。期末時点で未販売の積送品が原価200,000円残っている。決算時の決算整理仕訳（積送品を仕入に戻す方法は採らず、期末一括で売上原価算定する想定での記録上の整理）。", debit: [D("積送品", 200000)], credit: [D("仕入", 200000)], memo: "期末一括法は決算時に残った積送品を仕入から控除（積送品勘定へ振替）して売上原価を算定する。" },
  { id: "ss02", topic: "特殊商品売買", q: "委託販売（その都度法）。受託者から販売報告（売上300,000円・手数料30,000円・諸掛差引手取270,000円）。総額表示・売上計上の仕訳。", debit: [D("積送売掛金", 270000), D("積送諸掛", 30000)], credit: [D("積送品売上", 300000)], memo: "総額法は売上を総額300,000で計上、手数料は積送諸掛（費用）。手取りが債権。" },
  { id: "ss03", topic: "特殊商品売買", q: "受託販売。委託者へ手取金350,000円（販売400,000円・手数料50,000円差引）を当座から送金した。", debit: [D("受託販売", 350000)], credit: [D("当座預金", 350000)], memo: "受託販売勘定で委託者との貸借をまとめている。送金で勘定を相殺する。" },
  { id: "ss04", topic: "特殊商品売買", q: "割賦販売（回収基準を採用）。商品（原価400,000円・売価600,000円）を引き渡し、対価は5回月賦。引渡時は売上計上せず原価のみ振替（割賦未実現利益も計上）。", debit: [D("割賦売掛金", 600000)], credit: [D("割賦仮売上", 600000)], memo: "回収基準では引渡時に売上計上しない。対照勘定（割賦仮売上）で備忘記録する。" },
  { id: "ss05", topic: "特殊商品売買", q: "割賦販売（回収基準）。第1回回収120,000円。回収額に対応する売上を実現させる（原価率はここでは無視し売上計上のみ）。", debit: [D("現金", 120000)], credit: [D("割賦売上", 120000)], memo: "回収基準は回収時に売上を認識。販売時には収益認識せず、回収の都度実現させる。" },
  { id: "ss06", topic: "特殊商品売買", q: "試用販売（手許商品区分法・対照勘定法）。試送中の商品が買取意思表示なく決算を迎えた（売価300,000円・原価240,000円）。期末の対照勘定は残したまま、棚卸の処理（仕入から試用品に振替）。", debit: [D("試用品", 240000)], credit: [D("仕入", 240000)], memo: "未販売の試送品は手許在庫の延長。原価240,000を仕入から試用品（棚卸資産）へ振替えて売上原価から除く。" },
  { id: "ss07", topic: "特殊商品売買", q: "予約販売。商品の予約金600,000円を3か月分前受で受領（現金）。後に当期分1か月（200,000円相当）の商品を引き渡した。当期売上に振替える仕訳のみ示せ。", debit: [D("予約金", 200000)], credit: [D("売上", 200000)], memo: "予約金は引渡し・履行のあった分だけ売上に振替。残額は次期以降の負債のまま。" },
  { id: "ss08", topic: "特殊商品売買", q: "未着品売買。貨物代表証券600,000円のうち400,000円分を証券のまま転売、売価490,000円で掛け。売上計上と原価振替を同時に行う。", debit: [D("未着品売掛金", 490000), D("仕入", 400000)], credit: [D("未着品売上", 490000), D("未着品", 400000)], memo: "証券のままの転売も売上認識。売れた未着品原価を仕入(売上原価)へ振替。" },
  { id: "ss09", topic: "特殊商品売買", q: "委託販売を中止し、未販売の積送品（原価180,000円）の返送を受けた（その都度法で積送品勘定を使用中）。", debit: [D("仕入", 180000)], credit: [D("積送品", 180000)], memo: "委託の取消・返送は積送時の逆仕訳。積送品を仕入（手許在庫）へ戻す。" },

  // 仕訳なしパターン（ひっかけ）
  { id: "s65", topic: "特殊商品売買", q: "予約販売。得意先から商品の予約の申し込みを受けた（予約金の受領はまだない）。仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "申込みを受けただけで、金銭も商品も動いていない。会計上の取引が発生していないので仕訳しない。" },
  { id: "s66", topic: "特殊商品売買", q: "委託販売。受託者に対し商品の販売を委託する契約を結んだ（商品の積送はまだ行っていない）。仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "契約を結んだだけで商品はまだ手許にある。積送して初めて積送品へ振り替えるので、契約段階では仕訳なし。" },
  { id: "s67", topic: "一般商品売買", q: "得意先に商品の見積書を送付し、後日それに基づく注文を受けた（商品の引渡し・代金授受はまだ）。仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "注文を受けただけでは売買は未成立。引き渡して初めて売上計上するため、この段階は仕訳なし。" },

  // ── 工事契約 ──
  { id: "s09", topic: "工事契約", q: "請負金額10,000,000円の工事。当期発生原価3,000,000円、見積総原価8,000,000円。工事進行基準で当期の完成工事高を計上する（未収は完成工事未収入金）。", debit: [D("完成工事未収入金", 3750000)], credit: [D("完成工事高", 3750000)], memo: "進捗度=3,000,000/8,000,000=37.5%。収益=10,000,000×37.5%=3,750,000。原価の振替は別途。" },
  { id: "s10", topic: "工事契約", q: "工事進行基準。当期の進捗に基づく完成工事高4,000,000円、対応する完成工事原価3,200,000円を計上する（収益・原価、未収は完成工事未収入金）。", debit: [D("完成工事未収入金", 4000000), D("完成工事原価", 3200000)], credit: [D("完成工事高", 4000000), D("未成工事支出金", 3200000)], memo: "進行基準では収益と原価を進捗に応じて対応計上する。差額が当期の工事利益になる。" },

  // ── 収益認識 ──
  { id: "s11", topic: "収益認識", q: "商品を1,000,000円で販売し、対価は後日受領。同時に2年間の保守サービス（独立販売価格200,000円分）を含む。商品部分と保守部分に配分（商品800,000・保守200,000、保守は契約負債）。", debit: [D("売掛金", 1000000)], credit: [D("売上", 800000), D("契約負債", 200000)], memo: "1つの契約に複数の義務（商品＋保守）がある時は、それぞれに取引価格を配分。未提供の保守分は契約負債（前受け）として繰り延べる。" },
  { id: "s12", topic: "収益認識", q: "商品100,000円を販売したが、リベート（変動対価）10,000円の返金が見込まれる。純額で収益計上する場合の仕訳（返金部分は返金負債）。", debit: [D("売掛金", 100000)], credit: [D("売上", 90000), D("返金負債", 10000)], memo: "返金が見込まれる分は最初から収益に含めない（変動対価）。見込分は返金負債として区別する。" },
  { id: "s12b", topic: "収益認識", q: "商品を掛け販売した。取引価格500,000円のうち、当社が代理人と判定される手数料部分は50,000円。代理人取引として純額（手数料のみ）を収益計上する。", debit: [D("売掛金", 500000)], credit: [D("買掛金", 450000), D("売上", 50000)], memo: "自社が代理人（仲介役）なら、受け取る総額ではなく自分の取り分（手数料）だけが収益。本人か代理人かの判定が要。" },
  { id: "s12c", topic: "収益認識", q: "商品の独立販売価格200,000円とポイント（独立販売価格10,000円相当）をセットで顧客に提供し、対価200,000円を掛けで受け取った。取引価格を独立販売価格比で配分する（ポイント分は契約負債）。", debit: [D("売掛金", 200000)], credit: [D("売上", 190476), D("契約負債", 9524)], memo: "ポイントは別個の履行義務。取引価格200,000を独立販売価格比200,000:10,000で配分。売上=200,000×200,000/210,000≒190,476、契約負債=200,000×10,000/210,000≒9,524。" },
  { id: "s12d", topic: "収益認識", q: "商品を出荷した。出荷から検収までの間、収益認識基準として検収基準を採用している場合、出荷時点の仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "検収基準では、顧客の検収で収益が確定する。出荷しただけでは収益認識しないため仕訳なし。" },

  // ── 経過勘定 ──
  { id: "s13", topic: "経過勘定", q: "決算において、当期未払いの利息30,000円を見越計上する。", debit: [D("支払利息", 30000)], credit: [D("未払費用", 30000)], memo: "当期に発生した費用なのにまだ払っていない分は、当期の費用として見越し計上する（発生主義）。相手は未払費用。" },
  { id: "s14", topic: "経過勘定", q: "決算において、支払済保険料のうち翌期分60,000円を繰り延べる。", debit: [D("前払費用", 60000)], credit: [D("保険料", 60000)], memo: "支払済みでも翌期分の費用は当期の費用ではない。資産（前払費用）に振り替えて翌期へ繰り延べる。" },
  { id: "s15", topic: "経過勘定", q: "決算において、当期に受け取るべき未収の利息12,000円を見越計上する。", debit: [D("未収収益", 12000)], credit: [D("受取利息", 12000)], memo: "当期に発生した収益でまだ受け取っていない分は、当期の収益として見越し計上する。相手は未収収益。" },

  // ── 税金(消費税・法人税) ──
  { id: "s16", topic: "税金(消費税・法人税)", q: "商品550,000円（うち消費税50,000円）を掛けで仕入れた（税抜方式）。", debit: [D("仕入", 500000), D("仮払消費税", 50000)], credit: [D("買掛金", 550000)], memo: "税抜方式では、支払った消費税を仕入原価と分けて仮払消費税（後で控除する権利）として記録する。" },
  { id: "s17", topic: "税金(消費税・法人税)", q: "商品880,000円（うち消費税80,000円）を掛けで販売した（税抜方式）。", debit: [D("売掛金", 880000)], credit: [D("売上", 800000), D("仮受消費税", 80000)], memo: "受け取った消費税は自社の収益ではなく預り。仮受消費税として売上と分けて記録する。" },
  { id: "s18", topic: "税金(消費税・法人税)", q: "決算。仮受消費税80,000円、仮払消費税50,000円を相殺し、納付額を未払計上する。", debit: [D("仮受消費税", 80000)], credit: [D("仮払消費税", 50000), D("未払消費税", 30000)], memo: "決算で仮受と仮払を相殺し、納めるべき差額を未払消費税にする。預った税から払った税を引いた残りを納付する仕組み。" },
  { id: "s19", topic: "税金(消費税・法人税)", q: "法人税等の中間納付として200,000円を現金で納付した。", debit: [D("仮払法人税等", 200000)], credit: [D("現金", 200000)], memo: "中間納付はまだ税額が確定していない前払い。仮払法人税等として一旦資産計上し、確定時に精算する。" },
  { id: "s20", topic: "税金(消費税・法人税)", q: "決算。当期の法人税等は500,000円と確定。中間納付（仮払法人税等）200,000円がある。確定時の仕訳。", debit: [D("法人税等", 500000)], credit: [D("仮払法人税等", 200000), D("未払法人税等", 300000)], memo: "確定した税額から中間納付分を差し引いた残りが未払法人税等。中間で払った分は仮払法人税等で消す。" },

  // ── 現金預金 ──

  // ── 有価証券 ──
  { id: "s23", topic: "有価証券", q: "売買目的有価証券（帳簿500,000円）の期末時価が540,000円。期末評価（切放・洗替共通の当期分）。", debit: [D("売買目的有価証券", 40000)], credit: [D("有価証券評価損益", 40000)], memo: "売買目的は売却益を狙う保有なので、期末に時価評価し、評価差額をそのまま当期の損益にする。" },
  { id: "s24", topic: "有価証券", q: "その他有価証券（取得300,000円）の期末時価280,000円。全部純資産直入法（税効果無視）。", debit: [D("その他有価証券評価差額金", 20000)], credit: [D("その他有価証券", 20000)], memo: "その他有価証券は売却予定が明確でないため、評価差額を損益にせず純資産に直接入れる（全部純資産直入法）。" },
  { id: "s25", topic: "有価証券", q: "満期保有目的債券。額面1,000,000円を960,000円で取得、償却原価法（定額法）、償還まで4年。1年分の償却（相手は有価証券利息）。", debit: [D("満期保有目的債券", 10000)], credit: [D("有価証券利息", 10000)], memo: "額面より安く買った差額（金利調整差額）は、満期までの利息の一種。毎期少しずつ帳簿価額に加え、有価証券利息とする。" },
  { id: "s26", topic: "有価証券", q: "その他有価証券（取得500,000円）の時価が著しく下落し200,000円、回復見込みなし（減損処理）。", debit: [D("投資有価証券評価損", 300000)], credit: [D("その他有価証券", 300000)], memo: "時価が著しく下落し回復見込みもない時は減損。評価差額を純資産でなく当期の損失（評価損）として処理する。" },
  { id: "s26b", topic: "有価証券", q: "売買目的有価証券を400,000円で購入し、購入手数料5,000円とともに現金で支払った（手数料は取得原価に算入）。", debit: [D("売買目的有価証券", 405000)], credit: [D("現金", 405000)], memo: "有価証券の購入手数料などの付随費用は、取得原価に含めるのが原則。買うのにかかった金額すべてが取得原価。" },
  { id: "s26c", topic: "有価証券", q: "売買目的有価証券（帳簿405,000円）を430,000円で売却、代金は当座預金。", debit: [D("当座預金", 430000)], credit: [D("売買目的有価証券", 405000), D("有価証券売却益", 25000)], memo: "売却時は帳簿価額と売却額の差を売却損益にする。期末の評価損益とは別の科目なので注意。430,000−405,000=25,000の売却益。" },
  { id: "s26d", topic: "有価証券", q: "その他有価証券（取得300,000円）の期末時価が350,000円。全部純資産直入法（税効果無視）による期末評価。", debit: [D("その他有価証券", 50000)], credit: [D("その他有価証券評価差額金", 50000)], memo: "その他有価証券の評価差益も損益にせず純資産直入。全部純資産直入法では差益・差損とも純資産で処理する。" },
  { id: "s26e", topic: "有価証券", q: "その他有価証券（取得300,000円・時価350,000円・評価差益計上済）について、翌期首に振り戻す（洗替法）。", debit: [D("その他有価証券評価差額金", 50000)], credit: [D("その他有価証券", 50000)], memo: "その他有価証券は洗替法が原則。翌期首に前期末の評価を振り戻し、取得原価に戻してから再評価する。" },
  { id: "s26f", topic: "有価証券", q: "満期保有目的債券（額面1,000,000円、取得960,000円、償却原価法・定額法、残存4年）。当期償却後の利息受取30,000円を現金で受領。利札分のみの仕訳。", debit: [D("現金", 30000)], credit: [D("有価証券利息", 30000)], memo: "クーポン（利札）の受取りも有価証券利息。償却原価法による償却額とは別に、実際に受け取る利息として計上する。" },

  // ── 有形固定資産 ──
  { id: "s27", topic: "有形固定資産", q: "備品（取得1,000,000円、期首減価償却累計額360,000円）を定率法（償却率20%）で当期償却（間接法）。", debit: [D("減価償却費", 128000)], credit: [D("減価償却累計額", 128000)], memo: "定率法は期首の帳簿価額（取得原価−累計額）に償却率を掛ける。年々償却額が減っていくのが特徴。" },
  { id: "s28", topic: "有形固定資産", q: "備品（取得1,000,000円、減価償却累計額640,000円）を300,000円で売却、代金は現金（間接法）。", debit: [D("減価償却累計額", 640000), D("現金", 300000), D("固定資産売却損", 60000)], credit: [D("備品", 1000000)], memo: "売却時はまず累計額を取り消して簿価を出し、売却額との差を損益に。簿価＞売却額なら売却損。" },
  { id: "s29", topic: "有形固定資産", q: "建物の改良・修繕に500,000円支出。うち資本的支出300,000円、収益的支出200,000円、現金払い。", debit: [D("建物", 300000), D("修繕費", 200000)], credit: [D("現金", 500000)], memo: "支出のうち資産価値を高める部分（資本的支出）は資産計上、現状維持の修繕（収益的支出）は費用。区別が論点。" },
  { id: "s29b", topic: "有形固定資産", q: "機械（取得900,000円、期首減価償却累計額540,000円、間接法）を期首に除却した。処分価値は50,000円（貯蔵品）。", debit: [D("減価償却累計額", 540000), D("貯蔵品", 50000), D("固定資産除却損", 310000)], credit: [D("機械装置", 900000)], memo: "除却は資産を帳簿から外す処理。簿価から処分見込額（貯蔵品）を引いた残りが除却損になる。" },
  { id: "s29c", topic: "有形固定資産", q: "備品を生産高比例法で償却。取得1,000,000円、残存ゼロ、総利用可能時間10,000時間、当期利用1,200時間（間接法）。", debit: [D("減価償却費", 120000)], credit: [D("減価償却累計額", 120000)], memo: "生産高比例法は使った分だけ償却する方法。当期利用量÷総利用可能量の割合で配分する。" },
  { id: "s29d", topic: "有形固定資産", q: "期中（期首から6か月後）に備品600,000円を取得し現金払い。決算で定額法・耐用年数5年・残存ゼロ・月割償却（間接法）。当期の減価償却の仕訳。", debit: [D("減価償却費", 60000)], credit: [D("減価償却累計額", 60000)], memo: "期中取得は使った期間だけ償却する（月割）。1年分の償却費を計算し、保有月数分だけ計上する。" },
  { id: "s29e", topic: "有形固定資産", q: "国庫補助金200,000円を受領して取得した機械（取得原価500,000円）について、直接減額方式で圧縮記帳する。", debit: [D("固定資産圧縮損", 200000)], credit: [D("機械装置", 200000)], memo: "圧縮記帳は補助金分だけ資産を減額し、その期の課税を繰り延べる処理。直接減額方式では圧縮損を計上する。" },

  // ── 減損 ──
  { id: "s30", topic: "減損", q: "建物（取得1,000,000円、減価償却累計額400,000円）。減損を認識、回収可能価額450,000円（間接法・減損損失累計額使用）。", debit: [D("減損損失", 150000)], credit: [D("減損損失累計額", 150000)], memo: "減損は簿価を回収可能価額まで一気に下げる処理。簿価−回収可能価額が減損損失になる。" },
  { id: "s31", topic: "減損", q: "のれん（帳簿800,000円）を含む資産グループに減損損失600,000円を認識。まずのれんに優先配分する場合、のれんへの配分額の仕訳（のれん分のみ）。", debit: [D("減損損失", 600000)], credit: [D("のれん", 600000)], memo: "のれんを含む資産グループの減損は、まずのれんに優先的に配分するのが原則。のれんは価値の裏付けが弱いため。" },

  // ── 繰延資産・無形 ──
  { id: "s32", topic: "繰延資産・無形", q: "会社設立のための費用400,000円を現金で支出し、繰延資産（創立費）として計上した。", debit: [D("創立費", 400000)], credit: [D("現金", 400000)], memo: "会社設立にかかった費用は、効果が将来にも及ぶとして繰延資産（創立費）に計上できる（任意）。" },
  { id: "s33", topic: "繰延資産・無形", q: "自社利用ソフトウェア（帳簿1,000,000円）を見込利用可能期間5年で当期償却（直接法）。", debit: [D("ソフトウェア償却", 200000)], credit: [D("ソフトウェア", 200000)], memo: "自社利用ソフトは利用可能期間で均等償却。将来の費用節減などの効果が及ぶ期間に配分する。" },

  // ── 社債 ──
  { id: "s34", topic: "社債", q: "額面1,000,000円、発行980,000円、券面利率3%、実効4%、利払日末。1年目末の利払と償却（利息法）。", debit: [D("社債利息", 39200)], credit: [D("現金", 30000), D("社債", 9200)], memo: "利息法は帳簿価額×実効利率が利息費用。実際に払う額（額面×券面利率）との差を社債に加え、簿価を額面に近づける。" },
  { id: "s35", topic: "社債", q: "社債（帳簿価額990,000円）のうち額面500,000円を、買入価格485,000円で買入償還した（帳簿の該当分495,000円）。", debit: [D("社債", 495000)], credit: [D("現金", 485000), D("社債償還益", 10000)], memo: "買入償還は、消す社債の帳簿価額と買入額の差が損益。帳簿より安く買い戻せば償還益。" },
  { id: "s35b", topic: "社債", q: "額面1,000,000円の社債を、払込金額980,000円で発行し当座預金に入金。社債発行費30,000円を現金で支払った（発行費は繰延資産処理）。発行の仕訳（2つ）。", debit: [D("当座預金", 980000), D("社債発行費", 30000)], credit: [D("社債", 980000), D("現金", 30000)], memo: "社債は払込金額で計上する。発行費は将来の期間にも効果が及ぶとして繰延資産（社債発行費）にできる。" },
  { id: "s35c", topic: "社債", q: "満期日に社債（額面1,000,000円、帳簿価額がすでに額面と一致）を額面で償還し、当座預金から支払った。", debit: [D("社債", 1000000)], credit: [D("当座預金", 1000000)], memo: "満期償還は額面で社債を消すだけ。償却原価法で簿価がすでに額面に達していれば差額は出ない。" },
  { id: "s35d", topic: "社債", q: "額面1,000,000円、発行価額950,000円、償却原価法（定額法）、償還まで5年。1年分の償却（定額法）。", debit: [D("社債利息", 10000)], credit: [D("社債", 10000)], memo: "定額法の償却は、金利調整差額を償還までの年数で均等配分する。毎期同額を社債に加算する。" },

  // ── 引当金 ──
  { id: "s36", topic: "引当金", q: "売掛金期末2,000,000円に貸倒実績率2%で引当（差額補充法、既存残高0）。", debit: [D("貸倒引当金繰入", 40000)], credit: [D("貸倒引当金", 40000)], memo: "差額補充法は、必要な引当額と既存残高の差だけを繰り入れる。今回は残高0なので必要額全額を計上。" },
  { id: "s37", topic: "引当金", q: "翌期支給見込の賞与のうち当期負担分900,000円を賞与引当金として計上。", debit: [D("賞与引当金繰入", 900000)], credit: [D("賞与引当金", 900000)], memo: "翌期支給でも、当期の労働に対応する分は当期の費用。当期負担分を賞与引当金として見越し計上する。" },

  // ── 資産除去債務 ──
  { id: "s38", topic: "資産除去債務", q: "機械を取得（本体3,000,000円・現金）。除去費用の割引現在価値200,000円を資産除去債務に計上。", debit: [D("機械装置", 3200000)], credit: [D("現金", 3000000), D("資産除去債務", 200000)], memo: "将来の除去費用を、今の価値（割引現在価値）に直して資産除去債務に計上。同額を資産の取得原価にも上乗せする。" },
  { id: "s39", topic: "資産除去債務", q: "資産除去債務（期首200,000円）について割引率3%で時の経過による調整（利息費用）を計上。", debit: [D("利息費用", 6000)], credit: [D("資産除去債務", 6000)], memo: "時の経過で割引が解けていく分を、利息費用として毎期債務に加える。期首債務×割引率で計算する。" },

  // ── 退職給付 ──
  { id: "s40", topic: "退職給付", q: "当期：勤務費用200,000、利息費用30,000、期待運用収益20,000。退職給付費用を計上（相手は退職給付引当金）。", debit: [D("退職給付費用", 210000)], credit: [D("退職給付引当金", 210000)], memo: "退職給付費用は、債務を増やす要素（勤務費用＋利息費用）から、資産が稼ぐ期待運用収益を引いて求める。" },
  { id: "s41", topic: "退職給付", q: "年金基金へ掛金150,000円を現金拠出した（退職給付引当金を取り崩す）。", debit: [D("退職給付引当金", 150000)], credit: [D("現金", 150000)], memo: "掛金の拠出は、すでに積み立ててある引当金を取り崩す処理。費用は発生時にすでに計上済み。" },
  { id: "s41b", topic: "退職給付", q: "従業員の退職に伴い、退職一時金300,000円を現金で支給した（内部引当）。", debit: [D("退職給付引当金", 300000)], credit: [D("現金", 300000)], memo: "一時金の支給も、過去に費用計上して積み立てた引当金を取り崩して充てる。" },
  { id: "s41c", topic: "退職給付", q: "当期に数理計算上の差異が発生（年金資産の運用が予定を下回り、不利差異50,000円）。発生年度から10年で定額償却する場合、当期の費用処理額の仕訳（退職給付費用・引当金）。", debit: [D("退職給付費用", 5000)], credit: [D("退職給付引当金", 5000)], memo: "数理差異は発生時に全額費用にせず、一定年数で少しずつ費用処理する。今期はその1年分だけ計上する。" },
  { id: "s41d", topic: "退職給付", q: "勤務費用250,000、利息費用40,000、期待運用収益35,000、数理差異の費用処理額5,000（費用増加）。当期の退職給付費用を計上する。", debit: [D("退職給付費用", 260000)], credit: [D("退職給付引当金", 260000)], memo: "退職給付費用は各要素の合算。勤務・利息・数理差異(費用側)を足し、期待運用収益を引いて求める。" },

  // ── 純資産・自己株式 ──
  { id: "s42", topic: "純資産・自己株式", q: "自己株式（帳簿200,000円）を250,000円で処分、当座入金。", debit: [D("当座預金", 250000)], credit: [D("自己株式", 200000), D("自己株式処分差益", 50000)], memo: "自己株式を帳簿より高く処分した差額は利益だが、資本取引なので損益でなくその他資本剰余金（処分差益）に入れる。" },
  { id: "s43", topic: "純資産・自己株式", q: "自己株式100,000円を消却した（その他資本剰余金を減額）。", debit: [D("その他資本剰余金", 100000)], credit: [D("自己株式", 100000)], memo: "自己株式の消却は、その他資本剰余金を減らして株式を消す。資本の払い戻しに近い性質。" },
  { id: "s44", topic: "純資産・自己株式", q: "繰越利益剰余金から配当500,000円を決議。利益準備金50,000円を積立て（配当は未払配当金）。", debit: [D("繰越利益剰余金", 550000)], credit: [D("未払配当金", 500000), D("利益準備金", 50000)], memo: "配当時は、会社財産の流出を防ぐため一定額の準備金積立が会社法で強制される。配当と積立をセットで処理。" },
  { id: "s44b", topic: "純資産・自己株式", q: "新株を発行し、払込金額1,000,000円が当座預金に入金された。会社法規定の最低額を資本金とする（半額は資本準備金）。", debit: [D("当座預金", 1000000)], credit: [D("資本金", 500000), D("資本準備金", 500000)], memo: "払込額は最低でも半額を資本金にする。残りは資本準備金にできる（会社法）。" },
  { id: "s44c", topic: "純資産・自己株式", q: "自己株式（帳簿200,000円）を150,000円で処分し当座入金（処分差損が生じる）。", debit: [D("当座預金", 150000), D("自己株式処分差損", 50000)], credit: [D("自己株式", 200000)], memo: "処分額が帳簿を下回る差額（処分差損）は、その他資本剰余金の減少として処理する。損益にしない。" },
  { id: "s44d", topic: "純資産・自己株式", q: "自己株式を120,000円で取得し、手数料3,000円とともに現金で支払った（手数料は費用処理）。", debit: [D("自己株式", 120000), D("支払手数料", 3000)], credit: [D("現金", 123000)], memo: "自己株式は取得原価だけで計上。取得時の手数料は取得原価に含めず、営業外費用（支払手数料）として処理する。" },
  { id: "s44e", topic: "純資産・自己株式", q: "資本準備金300,000円を資本金に組み入れる計数変動の仕訳。", debit: [D("資本準備金", 300000)], credit: [D("資本金", 300000)], memo: "準備金を資本金に振り替える計数変動。純資産の中での移動なので、純資産の総額は変わらない。" },

  // ── 税効果 ──
  { id: "s45", topic: "税効果", q: "貸倒引当金繰入超過額100,000円（損金不算入＝将来減算一時差異）。実効税率30%で税効果適用。", debit: [D("繰延税金資産", 30000)], credit: [D("法人税等調整額", 30000)], memo: "損金不算入の費用は、将来認められた時に税金が減る（将来減算一時差異）。その税効果を繰延税金資産として今計上する。" },
  { id: "s46", topic: "税効果", q: "減価償却超過額200,000円（損金不算入・将来減算一時差異）。実効税率30%で税効果適用。", debit: [D("繰延税金資産", 60000)], credit: [D("法人税等調整額", 60000)], memo: "減価償却超過額も将来減算一時差異。将来解消時に課税所得を減らすため、繰延税金資産を計上する。" },
  { id: "s47", topic: "税効果", q: "その他有価証券評価差益100,000円（益金算入されず、将来加算一時差異）。実効税率30%、純資産直入と対応する税効果の仕訳。", debit: [D("その他有価証券評価差額金", 30000)], credit: [D("繰延税金負債", 30000)], memo: "その他有価証券の評価差益は将来加算一時差異。将来課税されるため繰延税金負債を立て、相手も純資産（評価差額金）で調整する。" },
  { id: "s48", topic: "税効果", q: "前期計上の繰延税金資産のうち、当期に一時差異が解消し30,000円を取り崩す。", debit: [D("法人税等調整額", 30000)], credit: [D("繰延税金資産", 30000)], memo: "一時差異が解消したら、計上していた繰延税金資産を取り崩す。相手の法人税等調整額は借方（税費用が増える方向）。" },

  // ── 外貨建 ──
  { id: "s49", topic: "外貨建", q: "外貨建売掛金1,000ドル（取引時@140円で計上済）。決算日レート@145円。換算替えの仕訳。", debit: [D("売掛金", 5000)], credit: [D("為替差損益", 5000)], memo: "外貨建ての貨幣項目（売掛金など）は決算日レートで換算し直す。換算差額は為替差損益として当期の損益にする。" },

  // ── リース ──
  { id: "s50", topic: "リース", q: "ファイナンスリース開始。見積現金購入価額450,000円（利子抜き法でリース資産・債務計上）。", debit: [D("リース資産", 450000)], credit: [D("リース債務", 450000)], memo: "ファイナンスリースは実質的に資産を買ったのと同じとみなし、資産・負債を計上する。利子抜き法は元本部分で計上。" },

  // ── デリバティブ（厚め・ヘッジ会計中心） ──
  // 金利スワップ
  { id: "d01", topic: "デリバティブ", q: "金利スワップを締結（変動受取・固定支払）。締結時のオプション料等の支払いはない。締結時の仕訳。", noEntry: true, debit: [], credit: [], memo: "デリバティブは契約締結時の時価がゼロなので仕訳なし。期末に時価評価で初めて差金を計上する。" },
  { id: "d02", topic: "デリバティブ", q: "金利スワップ（時価ゼロで締結）。決算日の時価評価で受取側に有利＝評価益50,000円が発生（独立処理）。", debit: [D("金利スワップ", 50000)], credit: [D("金利スワップ差金", 50000)], memo: "独立処理（時価評価益独立処理）はデリバティブの時価変動を当期損益に計上。相手は金利スワップ差金（P/L科目）。" },
  { id: "d03", topic: "デリバティブ", q: "金利スワップ（特例処理の要件を満たす）。決算日における時価評価の仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "特例処理（金利スワップの特例処理）は時価評価せず、利息と相殺する処理。決算時の評価仕訳は不要＝仕訳なし。" },
  { id: "d04", topic: "デリバティブ", q: "金利スワップ（特例処理）。当期のスワップ純受取額12,000円を現金で受領。借入金の支払利息と相殺処理する。", debit: [D("現金", 12000)], credit: [D("支払利息", 12000)], memo: "特例処理は受払差額を支払利息に直接加減算する。本来の支払利息から12,000を減らす形（支払利息のマイナス＝貸方）。" },

  // 為替予約（独立処理＋ヘッジ会計の繰延）
  { id: "d05", topic: "デリバティブ", q: "予定取引（将来のドル建売上）に対し為替予約@145円を締結（繰延ヘッジ会計適用）。決算日の予約の時価評価で評価益5,000円が発生（税効果無視）。", debit: [D("為替予約", 5000)], credit: [D("繰延ヘッジ損益", 5000)], memo: "繰延ヘッジはヘッジ手段の評価差額を損益に出さず純資産（繰延ヘッジ損益）に繰り延べる。ヘッジ対象が実現するまで保留。" },
  { id: "d06", topic: "デリバティブ", q: "上記繰延ヘッジ（評価益5,000円計上済）。ヘッジ対象の予定取引が実現し売上を計上した。繰延ヘッジ損益を取り崩して当期損益に振り替える仕訳。", debit: [D("繰延ヘッジ損益", 5000)], credit: [D("為替差損益", 5000)], memo: "ヘッジ対象が損益に影響する時に繰延ヘッジ損益を振り戻し、当期損益に算入。これがヘッジ会計の核心。" },

  // 時価ヘッジ
  { id: "d07", topic: "デリバティブ", q: "その他有価証券（取得500,000円）の時価変動リスクをヘッジするため先物を売り建て。時価ヘッジ会計を適用、その他有価証券の評価損30,000円を当期損益に計上する仕訳。", debit: [D("投資有価証券評価損", 30000)], credit: [D("その他有価証券", 30000)], memo: "時価ヘッジは通常なら純資産直入のヘッジ対象の評価差額を、損益に計上する例外処理。ヘッジ手段（先物）の損益と対応させる。" },

  // 先物取引
  { id: "d08", topic: "デリバティブ", q: "国債先物を100,000円分売建て、委託証拠金として5,000円を現金で差し入れた。", debit: [D("先物取引差金", 5000)], credit: [D("現金", 5000)], memo: "証拠金の差入れは先物取引差金（または差入保証金）。建玉自体は時価ゼロなので別途仕訳しない。" },
  { id: "d09", topic: "デリバティブ", q: "上記の国債先物（売建）について、決算日の時価評価で含み益3,000円が発生（独立処理）。", debit: [D("先物取引差金", 3000)], credit: [D("先物利益", 3000)], memo: "独立処理ではデリバティブの含み損益を当期損益に。売建で時価が下がれば利益、上がれば損失。" },

  // 通貨スワップ
  { id: "d10", topic: "デリバティブ", q: "通貨スワップ（ドル受取・円支払）を締結。締結時の時価ゼロ。決算日の時価評価で含み益40,000円（独立処理）。", debit: [D("通貨スワップ", 40000)], credit: [D("為替差損益", 40000)], memo: "通貨スワップは為替変動リスクの管理に使う。独立処理なら評価差額を当期損益に。" },

  // ── 当座借越 ──
  { id: "ge01", topic: "現金預金", q: "当座預金残高が30,000円のところ、買掛金80,000円を小切手で支払った（銀行と当座借越契約あり、二勘定制）。", debit: [D("買掛金", 80000)], credit: [D("当座預金", 30000), D("当座借越", 50000)], memo: "二勘定制は当座預金と当座借越を分けて記帳。残高を超える支払いは超過分を当座借越（負債）に。" },
  { id: "ge02", topic: "現金預金", q: "当座借越50,000円があるところ、売掛金回収80,000円が当座預金に入金された（二勘定制）。", debit: [D("当座借越", 50000), D("当座預金", 30000)], credit: [D("売掛金", 80000)], memo: "入金時はまず当座借越を消し、残額を当座預金へ。借越50,000を消して残り30,000が当座預金。" },

  // ── 保証債務 ──
  { id: "ho01", topic: "保証債務", q: "得意先から受け取った約束手形200,000円を取引銀行で割り引いた（手取金は当座預金、割引料2,000円、保証債務の時価は手形額面の1%）。", debit: [D("当座預金", 198000), D("手形売却損", 2000), D("保証債務費用", 2000)], credit: [D("受取手形", 200000), D("保証債務", 2000)], memo: "手形割引は遡求義務（不渡時の支払義務）が残るため保証債務を時価で計上。200,000×1%=2,000を費用と債務に。" },
  { id: "ho02", topic: "保証債務", q: "上記の割引手形が無事に決済された（保証債務2,000円を消滅させる）。", debit: [D("保証債務", 2000)], credit: [D("保証債務取崩益", 2000)], memo: "手形が無事決済されれば遡求義務は消滅。保証債務を取り崩し、相手は取崩益（収益）。" },

  // ── 有価証券の保有目的区分の変更 ──
  { id: "u01", topic: "有価証券", q: "売買目的有価証券（帳簿400,000円・時価420,000円）を、保有方針の変更により売買目的からその他有価証券に振替える。", debit: [D("その他有価証券", 420000)], credit: [D("売買目的有価証券", 400000), D("有価証券評価損益", 20000)], memo: "売買目的からの振替は振替時の時価で振替。評価差額（420,000−400,000=20,000）は当期損益に。" },
  { id: "u02", topic: "有価証券", q: "満期保有目的債券（帳簿価額980,000円）を、保有方針の変更によりその他有価証券に振替える。", debit: [D("その他有価証券", 980000)], credit: [D("満期保有目的債券", 980000)], memo: "満期保有目的からその他有価証券への振替は、振替時の償却原価（帳簿価額）で振替える。評価差額は出ない。" },
  { id: "u03", topic: "有価証券", q: "その他有価証券（帳簿500,000円・前期末時価550,000円で評価差額金50,000円計上済・洗替済）を子会社株式に振替える。当期取得相当として処理（振替時の帳簿は取得原価500,000）。", debit: [D("子会社株式", 500000)], credit: [D("その他有価証券", 500000)], memo: "その他有価証券から子会社株式への振替は、洗替後の取得原価（帳簿価額）で振替える。" },

  // ── 工事契約（追加） ──
  { id: "k01", topic: "工事契約", q: "工事進行基準。請負金額20,000,000円、見積総原価16,000,000円、当期発生原価4,000,000円（1年目）。当期の完成工事高を計上（相手は完成工事未収入金）。", debit: [D("完成工事未収入金", 5000000)], credit: [D("完成工事高", 5000000)], memo: "進捗度=4,000,000/16,000,000=25%。収益=20,000,000×25%=5,000,000。" },
  { id: "k02", topic: "工事契約", q: "上記工事の当期発生原価4,000,000円を完成工事原価へ振り替える（未成工事支出金から）。", debit: [D("完成工事原価", 4000000)], credit: [D("未成工事支出金", 4000000)], memo: "進行基準では発生原価をそのまま当期の完成工事原価に。利益=収益5,000,000−原価4,000,000=1,000,000。" },
  { id: "k03", topic: "工事契約", q: "工事の進捗度を合理的に見積れないが、発生原価の回収は見込める。原価回収基準により、当期発生原価3,000,000円分の収益を計上する。", debit: [D("完成工事未収入金", 3000000)], credit: [D("完成工事高", 3000000)], memo: "原価回収基準は、回収見込みの発生原価と同額だけ収益計上する（利益ゼロ）。進捗が見積れない時の方法。" },
  { id: "k04", topic: "工事契約", q: "工事契約に係る材料費・労務費・経費の当期発生額3,000,000円を未成工事支出金に集計した（現金等で支払済とし、相手は諸口＝現金）。", debit: [D("未成工事支出金", 3000000)], credit: [D("現金", 3000000)], memo: "工事原価はいったん未成工事支出金（仕掛品に相当）に集計してから完成工事原価へ振り替える。" },

  // ── 減損（追加） ──
  { id: "g01", topic: "減損", q: "機械（取得2,000,000円・減価償却累計額800,000円）。減損の兆候あり。割引前将来キャッシュフロー総額1,100,000円。減損を認識すべきか判定し、必要なら測定（回収可能価額900,000円、間接法・減損損失累計額）。", debit: [D("減損損失", 300000)], credit: [D("減損損失累計額", 300000)], memo: "簿価1,200,000＞割引前CF1,100,000なので減損認識。回収可能価額900,000まで減額→減損300,000。" },
  { id: "g02", topic: "減損", q: "資産（簿価500,000円）に減損の兆候。割引前将来CFが600,000円だった。減損損失を計上するか判定し仕訳しなさい。", noEntry: true, debit: [], credit: [], memo: "簿価500,000＜割引前CF600,000なので減損を認識しない＝仕訳なし。認識の判定がポイント。" },
  { id: "g03", topic: "減損", q: "土地（簿価3,000,000円）の減損。正味売却価額2,400,000円、使用価値2,200,000円。回収可能価額まで減額する（直接減額）。", debit: [D("減損損失", 600000)], credit: [D("土地", 600000)], memo: "回収可能価額=正味売却価額と使用価値の高い方=2,400,000。簿価3,000,000−2,400,000=減損600,000。" },

  // ── 引当金（追加） ──
  { id: "h01", topic: "引当金", q: "貸倒懸念債権500,000円（担保処分見込額100,000円）。財務内容評価法により、残額の50%を貸倒引当金として設定（既存残高0）。", debit: [D("貸倒引当金繰入", 200000)], credit: [D("貸倒引当金", 200000)], memo: "(債権500,000−担保100,000)×50%=200,000。貸倒懸念債権は財務内容評価法など。" },
  { id: "h02", topic: "引当金", q: "破産更生債権等600,000円（担保処分見込額150,000円）。担保等を控除した残額全額を貸倒引当金とする（既存残高0）。", debit: [D("貸倒引当金繰入", 450000)], credit: [D("貸倒引当金", 450000)], memo: "破産更生債権は債権額−担保処分見込額の全額を引当。600,000−150,000=450,000。" },
  { id: "h03", topic: "引当金", q: "製品保証費用について、当期売上に対する将来の保証見込額300,000円を製品保証引当金として計上。", debit: [D("製品保証引当金繰入", 300000)], credit: [D("製品保証引当金", 300000)], memo: "当期の売上に対応する将来費用を見越し計上。費用収益対応の原則による。" },
  { id: "h04", topic: "引当金", q: "売掛金期末3,000,000円に貸倒実績率2%で引当（差額補充法）。既に貸倒引当金残高が20,000円ある。", debit: [D("貸倒引当金繰入", 40000)], credit: [D("貸倒引当金", 40000)], memo: "必要額3,000,000×2%=60,000。既存20,000との差額40,000だけ繰入（差額補充法）。" },

  // ── 資産除去債務（追加） ──
  { id: "j01", topic: "資産除去債務", q: "設備の除去費用見積額500,000円（割引率2%・5年後に除去）。取得時の資産除去債務を割引現在価値で計上（現価係数0.906、債務=453,000円）。設備本体2,000,000円は現金。", debit: [D("構築物", 2453000)], credit: [D("現金", 2000000), D("資産除去債務", 453000)], memo: "将来の除去費用を現在価値453,000に割り引いて債務計上。同額を資産の取得原価に加える。" },
  { id: "j02", topic: "資産除去債務", q: "資産除去債務（期首453,000円）の時の経過による調整。割引率2%で利息費用を計上。", debit: [D("利息費用", 9060)], credit: [D("資産除去債務", 9060)], memo: "期首債務453,000×2%=9,060。時の経過で割引が解ける分を債務に加える。" },
  { id: "j03", topic: "資産除去債務", q: "資産除去債務に対応して資産計上した除去費用（資産除去債務分453,000円）を5年で定額償却（減価償却費に含める）。当期1年分。", debit: [D("減価償却費", 90600)], credit: [D("減価償却累計額", 90600)], memo: "資産計上した除去費用も通常の減価償却で費用配分。453,000÷5=90,600。" },
  { id: "j04", topic: "資産除去債務", q: "5年経過し設備を除去。資産除去債務500,000円に対し、実際の除去費用が520,000円かかり現金で支払った。", debit: [D("資産除去債務", 500000), D("履行差額", 20000)], credit: [D("現金", 520000)], memo: "見積500,000と実際520,000の差は履行差額。除去時に債務を消し、差額を損益に。" },

  // ── リース（追加） ──
  { id: "l01", topic: "リース", q: "ファイナンスリース（所有権移転外）。リース料総額600,000円、リース資産計上額（見積現金購入価額）540,000円。利子抜き法で開始時の仕訳。", debit: [D("リース資産", 540000)], credit: [D("リース債務", 540000)], memo: "利子抜き法はリース資産・債務を見積現金購入価額で計上。利息相当額60,000は期間配分。" },
  { id: "l02", topic: "リース", q: "上記リースの第1回リース料120,000円を現金で支払った。利息相当額12,000円（利子抜き法）。", debit: [D("リース債務", 108000), D("支払利息", 12000)], credit: [D("現金", 120000)], memo: "支払額120,000のうち利息12,000を費用に、残り108,000で元本(リース債務)を返済。" },
  { id: "l03", topic: "リース", q: "所有権移転外ファイナンスリース。リース資産540,000円をリース期間5年で定額償却（残存ゼロ・間接法）。当期1年分。", debit: [D("減価償却費", 108000)], credit: [D("減価償却累計額", 108000)], memo: "所有権移転外はリース期間で償却（耐用年数でなく）。540,000÷5=108,000。" },
  { id: "l04", topic: "リース", q: "オペレーティングリースのリース料80,000円を現金で支払った。", debit: [D("支払リース料", 80000)], credit: [D("現金", 80000)], memo: "オペレーティングリースは資産計上せず、支払リース料（費用）として処理する。" },

  // ── 外貨建（追加） ──
  { id: "w01", topic: "外貨建", q: "商品2,000ドルを掛けで輸入。取引日レート@138円。仕入の仕訳。", debit: [D("仕入", 276000)], credit: [D("買掛金", 276000)], memo: "取引日のレートで換算。2,000×138=276,000。" },
  { id: "w02", topic: "外貨建", q: "上記の外貨建買掛金2,000ドル（@138円で計上）を決算日に換算替え。決算日レート@142円。", debit: [D("為替差損益", 8000)], credit: [D("買掛金", 8000)], memo: "貨幣項目は決算日レート換算。買掛金が2,000×(142−138)=8,000増える→為替差損。" },
  { id: "w03", topic: "外貨建", q: "外貨建買掛金2,000ドル（@138円で計上）を決済。決済日レート@140円で現金支払い。", debit: [D("買掛金", 276000), D("為替差損益", 4000)], credit: [D("現金", 280000)], memo: "支払額2,000×140=280,000。帳簿276,000との差4,000が為替差損。" },
  { id: "w04", topic: "外貨建", q: "為替予約（振当処理）。外貨建売掛金1,000ドルに@145円で為替予約。取引時レート@140円。予約により売掛金を予約レートに固定（差額は為替差損益）。", debit: [D("売掛金", 5000)], credit: [D("為替差損益", 5000)], memo: "振当処理は予約レート@145で固定。取引時@140との差1,000×5=5,000を売掛金に加算。" },

  // ── 外貨建（追加・簿記論論点） ──
  { id: "w05", topic: "外貨建", q: "商品3,000ドルを掛けで輸出。取引日レート@142円。売上の仕訳。", debit: [D("売掛金", 426000)], credit: [D("売上", 426000)], memo: "取引日レートで換算。3,000×142=426,000。売上は取引時で固定し決算で換算替えしない。" },
  { id: "w06", topic: "外貨建", q: "外貨建売掛金3,000ドル（@142円で計上）を決算日に換算。決算日レート@138円。", debit: [D("為替差損益", 12000)], credit: [D("売掛金", 12000)], memo: "売掛金（貨幣項目）を決算日レートで換算。3,000×(142−138)=12,000減少→為替差損。" },
  { id: "w07", topic: "外貨建", q: "外貨建売掛金3,000ドル（@142円で計上）を決済、決済日レート@140円で当座入金。", debit: [D("当座預金", 420000), D("為替差損益", 6000)], credit: [D("売掛金", 426000)], memo: "入金額3,000×140=420,000。帳簿426,000との差6,000が為替差損。" },
  { id: "w08", topic: "外貨建", q: "海外仕入の前払金として2,000ドルを支払った（@140円・現金）。", debit: [D("前払金", 280000)], credit: [D("現金", 280000)], memo: "前払金は非貨幣項目。支払時レートで計上し、決算で換算替えしない（取得原価のまま）。" },
  { id: "w09", topic: "外貨建", q: "上記の前払金（2,000ドル・@140円=280,000円）に対応して商品5,000ドルが到着、残額3,000ドルは掛け。到着時レート@145円。仕入の仕訳。", debit: [D("仕入", 715000)], credit: [D("前払金", 280000), D("買掛金", 435000)], memo: "前払金は払った時のレートで固定（@140×2,000=280,000）。残り3,000ドルは到着時@145で換算。" },
  { id: "w10", topic: "外貨建", q: "外貨建満期保有目的債券（額面1,000ドル・取得960ドル・@140円で取得）。期末レート@145円。償却なしとして決算時の換算替え（償却原価部分の換算）。", debit: [D("満期保有目的債券", 4800)], credit: [D("為替差損益", 4800)], memo: "貨幣項目なので決算日レート換算。960×(145−140)=4,800の増加→為替差益。" },
  { id: "w11", topic: "外貨建", q: "外貨建売掛金1,000ドルについて、取引時に決済予定日の為替予約@145円を締結（独立処理・取引時レート@140円・予約時の直物レート@142円）。予約時の仕訳を示しなさい（ヘッジ目的でない独立処理）。", noEntry: true, debit: [], credit: [], memo: "独立処理では予約締結時に直ちに為替予約という金融商品を時価評価するが、締結時の時価はゼロのため仕訳なし。期末に時価評価で初めて差金計上。" },
  { id: "w12", topic: "外貨建", q: "外貨建買掛金2,000ドル（取引時@140円で計上済）に対し、振当処理で@142円の為替予約を締結。買掛金を予約レートに固定する仕訳（取引と予約が同時）。", debit: [D("為替差損益", 4000)], credit: [D("買掛金", 4000)], memo: "振当処理は予約レート@142で買掛金を固定。取引時@140との差2,000×(142−140)=4,000を買掛金に加算（負担増）。" },

  // ── 外貨建（さらに追加） ──
  { id: "w13", topic: "外貨建", q: "外貨建売掛金1,000ドルに対し決済予定日の為替予約@145円を締結（独立処理）。決算日、直物@142円、先物@146円。為替予約の時価評価（差金計上）。", debit: [D("為替予約", 1000)], credit: [D("為替差損益", 1000)], memo: "独立処理は為替予約自体を時価評価。予約@145と決算時先物@146の差1×1,000=1,000を評価益として計上。" },
  { id: "w14", topic: "外貨建", q: "予定取引（将来のドル建売上）に対し為替予約@145円を締結（繰延ヘッジ）。決算日に予約の時価評価で為替予約に5,000円の評価益が出た。", debit: [D("為替予約", 5000)], credit: [D("繰延ヘッジ損益", 5000)], memo: "繰延ヘッジは予約の評価差額をP/Lに出さず純資産（繰延ヘッジ損益）に繰り延べる。ヘッジ対象の実現に合わせる。" },
  { id: "w15", topic: "外貨建", q: "在外子会社の財務諸表換算。資産（外貨ベース）100,000ドルを決算日レート@140円で換算する仕訳は？", noEntry: true, debit: [], credit: [], memo: "個別の換算手続きであり、子会社単体の帳簿上の仕訳は発生しない。連結手続上の換算のため仕訳なし。" },
  { id: "w16", topic: "外貨建", q: "外貨建社債（額面1,000ドル）を取引日レート@140円で発行、当座入金。", debit: [D("当座預金", 140000)], credit: [D("社債", 140000)], memo: "外貨建社債は取引時レートで計上。決算で貨幣項目として換算替えする。" },
  { id: "w17", topic: "外貨建", q: "外貨建売買目的有価証券（取得2,000ドル・@140円で計上、帳簿280,000円）。期末時価2,100ドル、決算日レート@145円。期末評価（時価×決算日レートで換算）。", debit: [D("売買目的有価証券", 24500)], credit: [D("有価証券評価損益", 24500)], memo: "売買目的の外貨建は時価×決算日レートで換算。2,100×145=304,500−280,000=24,500の評価益（為替分と時価分を一括計上）。" },
  { id: "w18", topic: "外貨建", q: "外貨建その他有価証券（取得1,000ドル・@140円計上）の期末時価1,000ドル、決算日レート@145円。全部純資産直入法、税効果無視。", debit: [D("その他有価証券", 5000)], credit: [D("その他有価証券評価差額金", 5000)], memo: "時価変動なし・為替のみ変動。1,000×(145−140)=5,000の為替評価差額もその他有価証券評価差額金に。" },
  { id: "w19", topic: "外貨建", q: "外貨建子会社株式（取得3,000ドル・@140円計上、帳簿420,000円）の期末。決算日レート@145円。換算替えの仕訳。", noEntry: true, debit: [], credit: [], memo: "子会社株式は非貨幣項目として取得時レートのまま据え置く。決算時の換算替えしない＝仕訳なし。" },
  { id: "w20", topic: "外貨建", q: "外貨建満期保有目的債券（額面1,000ドル・取得960ドル・@140円計上）。償却原価法定額法、残存4年。1年分の償却を当期平均レート@142円で換算。", debit: [D("満期保有目的債券", 1420)], credit: [D("有価証券利息", 1420)], memo: "償却額は10ドル/年。期中の利息収益なので期中平均レート@142で換算。10×142=1,420を社債に加算。" },

  // ── 繰延資産・無形（追加） ──
  { id: "p01", topic: "繰延資産・無形", q: "開業準備のための費用300,000円を現金で支出し、繰延資産（開業費）として計上した。", debit: [D("開業費", 300000)], credit: [D("現金", 300000)], memo: "開業費は会社設立後・営業開始前の費用。繰延資産に計上できる（任意）。" },
  { id: "p02", topic: "繰延資産・無形", q: "繰延資産の開発費（当期首残高500,000円）を5年で均等償却（直接法）。当期1年分。", debit: [D("開発費償却", 100000)], credit: [D("開発費", 100000)], memo: "開発費は繰延資産。効果の及ぶ期間（最長5年）で償却。500,000÷5=100,000。" },
  { id: "p03", topic: "繰延資産・無形", q: "市場販売目的のソフトウェア（帳簿900,000円）を、見込販売数量に基づき当期償却。当期償却額360,000円（最低でも残存有効期間での均等額以上）。", debit: [D("ソフトウェア償却", 360000)], credit: [D("ソフトウェア", 360000)], memo: "市場販売目的ソフトは見込販売数量(収益)基準で償却。ただし均等償却額を下限とする。" },
  { id: "p04", topic: "繰延資産・無形", q: "特許権600,000円を取得し、現金で支払った。", debit: [D("特許権", 600000)], credit: [D("現金", 600000)], memo: "特許権は無形固定資産。取得後は耐用年数（8年など）で償却する。" },

  // ── 本支店会計 ──
  { id: "m01", topic: "本支店", q: "本店が支店に現金200,000円を送付した。本店側の仕訳。", debit: [D("支店", 200000)], credit: [D("現金", 200000)], memo: "本支店間取引は照合勘定で処理。本店側は支店勘定（支店への投資）を増やす。" },
  { id: "m02", topic: "本支店", q: "本店から現金200,000円の送付を受けた。支店側の仕訳。", debit: [D("現金", 200000)], credit: [D("本店", 200000)], memo: "支店側は本店勘定（本店からの受入）を増やす。支店勘定と本店勘定は貸借逆で一致する。" },
  { id: "m03", topic: "本支店", q: "本店が支店へ商品を送付（原価300,000円に10%の内部利益を加算した振替価格で送付）。本店側の仕訳。", debit: [D("支店", 330000)], credit: [D("本店仕入", 330000)], memo: "内部利益を付けた振替価格=300,000×1.1=330,000で送付。本店側は支店勘定で処理。" },
  { id: "m04", topic: "本支店", q: "決算。支店の期末商品に含まれる内部利益30,000円を繰延内部利益として控除する。", debit: [D("繰延内部利益控除", 30000)], credit: [D("繰延内部利益", 30000)], memo: "本支店合併財務諸表では内部利益は未実現。期末在庫に含まれる分を控除する。" },
  { id: "m05", topic: "本支店", q: "期首商品に含まれていた内部利益25,000円を当期に戻し入れる（実現したため）。", debit: [D("繰延内部利益", 25000)], credit: [D("繰延内部利益戻入", 25000)], memo: "前期末に控除した内部利益は、当期に販売され実現するため戻し入れる。" },

  // ── 有価証券（追加） ──
  { id: "v01", topic: "有価証券", q: "売買目的有価証券（帳簿300,000円）の期末時価が340,000円。期末評価（切放法）。", debit: [D("売買目的有価証券", 40000)], credit: [D("有価証券評価損益", 40000)], memo: "売買目的は時価評価し差額をP/Lへ。340,000−300,000=40,000の評価益。" },
  { id: "v02", topic: "有価証券", q: "子会社株式（取得原価800,000円）を期末に保有。時価は850,000円。期末評価の仕訳を示しなさい。", noEntry: true, debit: [], credit: [], memo: "子会社株式は支配目的の保有で時価評価しない（取得原価のまま）。だから期末評価は仕訳なし。" },
  { id: "v03", topic: "有価証券", q: "その他有価証券（取得400,000円）の期末時価が360,000円。部分純資産直入法による評価（評価損のみP/L、税効果無視）。", debit: [D("投資有価証券評価損", 40000)], credit: [D("その他有価証券", 40000)], memo: "部分純資産直入法は、評価損は当期の費用に、評価益のみ純資産直入する保守的な方法。" },
  { id: "v04", topic: "有価証券", q: "満期保有目的債券を額面1,000,000円につき1,030,000円（プレミアム）で取得、償却原価法・定額法、残存3年。1年分の償却。", debit: [D("有価証券利息", 10000)], credit: [D("満期保有目的債券", 10000)], memo: "高く買った差額30,000は3年で償却。額面に近づけるため毎期帳簿を減らし、利息をマイナスする。" },
  { id: "v05", topic: "有価証券", q: "売買目的有価証券（額面1,000,000円の国債、端数利息込みで購入。前回利払日からの経過利息5,000円を含めて購入価額1,005,000円を現金払い）。", debit: [D("売買目的有価証券", 1000000), D("有価証券利息", 5000)], credit: [D("現金", 1005000)], memo: "購入時の経過利息は売り手に立替えた利息。有価証券の取得原価に含めず有価証券利息で区分する。" },
  { id: "v06", topic: "有価証券", q: "保有するその他有価証券に剰余金の配当があり、配当金30,000円を現金で受け取った。", debit: [D("現金", 30000)], credit: [D("受取配当金", 30000)], memo: "配当の受取りは受取配当金（収益）。有価証券の帳簿価額は動かさない。" },
  { id: "v07", topic: "有価証券", q: "売買目的有価証券（帳簿500,000円）を480,000円で売却し、代金は月末受取り（未収）。", debit: [D("未収入金", 480000), D("有価証券売却損", 20000)], credit: [D("売買目的有価証券", 500000)], memo: "売却額が帳簿を下回るので売却損。代金後日は未収入金（営業外の債権）。" },
  { id: "v08", topic: "有価証券", q: "その他有価証券（取得600,000円・前期末時価650,000円で評価差額金計上済）。当期首の振戻し（洗替法）。", debit: [D("その他有価証券評価差額金", 50000)], credit: [D("その他有価証券", 50000)], memo: "洗替法では翌期首に前期末評価を振り戻し、取得原価に戻してから当期末に再評価する。" },
  { id: "v09", topic: "有価証券", q: "売買目的有価証券を切放法で処理している。前期末に時価評価済（帳簿520,000円）。当期首の振戻しの要否を答えなさい。", noEntry: true, debit: [], credit: [], memo: "切放法は前期末の時価を新たな帳簿価額として引き継ぐため、期首の振戻しはしない＝仕訳なし。" },
  { id: "v10", topic: "有価証券", q: "満期保有目的債券（帳簿980,000円）を満期に額面1,000,000円で償還、現金受取り（償却は別途済み・帳簿は額面に到達済とする）。", debit: [D("現金", 1000000)], credit: [D("満期保有目的債券", 1000000)], memo: "満期に額面で償還。償却原価法で帳簿が額面に達していれば差額は出ない。" },
  { id: "v11", topic: "有価証券", q: "その他有価証券（取得300,000円）の時価が140,000円に著しく下落し回復見込みなし（減損）。", debit: [D("投資有価証券評価損", 160000)], credit: [D("その他有価証券", 160000)], memo: "著しい下落＋回復見込なしは強制的に減損。評価損はP/Lに計上し、純資産直入はしない。" },

  // ── 有形固定資産（追加） ──
  { id: "f01", topic: "有形固定資産", q: "建物を定額法で償却。取得5,000,000円、残存価額ゼロ、耐用年数25年（間接法）。1年分。", debit: [D("減価償却費", 200000)], credit: [D("減価償却累計額", 200000)], memo: "定額法は毎期同額。5,000,000÷25年=200,000。" },
  { id: "f02", topic: "有形固定資産", q: "備品を200%定率法で償却。取得1,000,000円、耐用年数5年（償却率0.4）、期首簿価1,000,000円（間接法）。1年目。", debit: [D("減価償却費", 400000)], credit: [D("減価償却累計額", 400000)], memo: "200%定率法の償却率=定額法率(0.2)×2=0.4。期首簿価×0.4=400,000。" },
  { id: "f03", topic: "有形固定資産", q: "総合償却。機械全体を平均耐用年数で一括償却。要償却額合計900,000円、平均耐用年数6年（間接法）。1年分。", debit: [D("減価償却費", 150000)], credit: [D("減価償却累計額", 150000)], memo: "総合償却は資産グループをまとめて平均耐用年数で償却。900,000÷6=150,000。" },
  { id: "f04", topic: "有形固定資産", q: "建物（取得3,000,000円・減価償却累計額1,800,000円）を1,400,000円で売却、代金は当座入金（間接法）。", debit: [D("減価償却累計額", 1800000), D("当座預金", 1400000)], credit: [D("建物", 3000000), D("固定資産売却益", 200000)], memo: "簿価1,200,000＜売却1,400,000なので売却益200,000。" },
  { id: "f05", topic: "有形固定資産", q: "火災で建物（取得2,000,000円・減価償却累計額1,200,000円）が焼失。保険金は未確定（間接法・火災未決算へ）。", debit: [D("減価償却累計額", 1200000), D("火災未決算", 800000)], credit: [D("建物", 2000000)], memo: "保険金確定前は損益を確定できないため、簿価を火災未決算（仮勘定）に振り替えて保留する。" },
  { id: "f06", topic: "有形固定資産", q: "上記の火災について保険金1,000,000円の支払いが確定した（火災未決算800,000円）。", debit: [D("未収入金", 1000000)], credit: [D("火災未決算", 800000), D("保険差益", 200000)], memo: "確定した保険金と火災未決算の差が損益。保険金が上回れば保険差益。" },
  { id: "f07", topic: "有形固定資産", q: "備品の耐用年数を当期から変更（残存簿価600,000円、残存年数を新たに3年に。残存価額ゼロ、定額法、間接法）。当期償却。", debit: [D("減価償却費", 200000)], credit: [D("減価償却累計額", 200000)], memo: "耐用年数変更は変更後の残存簿価を残存年数で配分（将来にわたり修正）。600,000÷3=200,000。" },
  { id: "f08", topic: "有形固定資産", q: "国庫補助金300,000円を現金で受け取った（収益計上）。", debit: [D("現金", 300000)], credit: [D("国庫補助金受贈益", 300000)], memo: "補助金の受取りは受贈益（収益）。後で圧縮記帳すれば課税を繰り延べられる。" },
  { id: "f09", topic: "有形固定資産", q: "建設中の建物について、工事代金の一部1,500,000円を当座預金から支払った（完成前）。", debit: [D("建設仮勘定", 1500000)], credit: [D("当座預金", 1500000)], memo: "完成前の支払いは建設仮勘定（未完成資産）。完成時に建物へ振り替える。" },
  { id: "f10", topic: "有形固定資産", q: "上記の建物が完成し引き渡しを受けた（建設仮勘定2,000,000円を建物へ振替）。", debit: [D("建物", 2000000)], credit: [D("建設仮勘定", 2000000)], memo: "完成・引渡しで建設仮勘定を本勘定（建物）へ振り替える。ここから減価償却を始める。" },
  { id: "f11", topic: "有形固定資産", q: "備品（取得800,000円・期首減価償却累計額500,000円）を下取りに出し、新備品900,000円を購入。下取価額250,000円、差額は現金払い（間接法）。", debit: [D("備品", 900000), D("減価償却累計額", 500000), D("固定資産売却損", 50000)], credit: [D("備品", 800000), D("現金", 650000)], memo: "旧備品の簿価300,000−下取250,000=売却損50,000。新備品は購入価額で計上、差額を現金。" },

  // ── 退職給付（追加） ──
  { id: "r01", topic: "退職給付", q: "勤務費用180,000、利息費用25,000、期待運用収益15,000。退職給付費用を計上（相手は退職給付引当金）。", debit: [D("退職給付費用", 190000)], credit: [D("退職給付引当金", 190000)], memo: "180,000+25,000−15,000=190,000。債務を増やす要素から資産の収益を引く。" },
  { id: "r02", topic: "退職給付", q: "過去勤務費用（給付水準引上げにより発生）120,000円を、発生年度から10年で定額償却。当期の費用処理額。", debit: [D("退職給付費用", 12000)], credit: [D("退職給付引当金", 12000)], memo: "過去勤務費用も発生時に全額でなく、一定年数で費用処理。120,000÷10=12,000。" },
  { id: "r03", topic: "退職給付", q: "数理計算上の差異（有利差異・運用が予定を上回った）80,000円を10年で償却。当期の費用処理（費用のマイナス）。", debit: [D("退職給付引当金", 8000)], credit: [D("退職給付費用", 8000)], memo: "有利差異は費用を減らす方向。80,000÷10=8,000を退職給付費用から控除する。" },
  { id: "r04", topic: "退職給付", q: "退職一時金250,000円を現金で支給した（内部引当）。", debit: [D("退職給付引当金", 250000)], credit: [D("現金", 250000)], memo: "支給は積み立ててきた引当金の取崩し。費用は過去に計上済み。" },
  { id: "r05", topic: "退職給付", q: "年金基金へ掛金200,000円を当座預金から拠出した。", debit: [D("退職給付引当金", 200000)], credit: [D("当座預金", 200000)], memo: "掛金拠出は引当金の減少（外部に積み立てた）。" },
  { id: "r06", topic: "退職給付", q: "勤務費用220,000、利息費用30,000、期待運用収益25,000、数理差異の費用処理10,000（費用増）、過去勤務費用の費用処理5,000（費用増）。当期退職給付費用。", debit: [D("退職給付費用", 240000)], credit: [D("退職給付引当金", 240000)], memo: "220,000+30,000−25,000+10,000+5,000=240,000。すべての要素を合算する総合問題。" },
  { id: "r07", topic: "退職給付", q: "連結上、退職給付に係る未認識数理差異40,000円（借方差異）を、その他の包括利益として認識する（税効果無視）。", debit: [D("退職給付に係る調整額", 40000)], credit: [D("退職給付に係る負債", 40000)], memo: "連結では未認識差異を即座にOCI（その他の包括利益）に計上し、負債に反映する点が個別と異なる。" },

  // ── 社債（追加） ──
  { id: "b01", topic: "社債", q: "額面2,000,000円を額面@100につき@97.5で発行、当座入金。", debit: [D("当座預金", 1950000)], credit: [D("社債", 1950000)], memo: "発行価額=2,000,000×97.5/100=1,950,000。社債は払込金額で計上する。" },
  { id: "b02", topic: "社債", q: "社債（額面2,000,000円・発行1,950,000円・償却原価法定額法・残存5年）の1年分の償却（定額法）。", debit: [D("社債利息", 10000)], credit: [D("社債", 10000)], memo: "金利調整差額50,000÷5年=10,000。毎期社債に加え額面に近づける。" },
  { id: "b03", topic: "社債", q: "社債利息（クーポン）の支払い。額面2,000,000円・年利2%・年1回。当座から支払い。", debit: [D("社債利息", 40000)], credit: [D("当座預金", 40000)], memo: "クーポン利息=額面×券面利率=2,000,000×2%=40,000。償却分とは別に計上。" },
  { id: "b04", topic: "社債", q: "社債（帳簿価額1,980,000円・額面2,000,000円）を満期に額面で償還、当座払い（償却済みで帳簿=額面に到達とする）。", debit: [D("社債", 2000000)], credit: [D("当座預金", 2000000)], memo: "満期償還は額面で社債を消す。償却が完了していれば差額なし。" },
  { id: "b05", topic: "社債", q: "社債（額面1,000,000円・帳簿価額988,000円）を額面@100につき@99で買入償還、当座払い。", debit: [D("社債", 988000), D("社債償還損", 2000)], credit: [D("当座預金", 990000)], memo: "買入額990,000＞帳簿988,000なので償還損2,000。社債を帳簿で消し、差額の損を借方に。" },
  { id: "b06", topic: "社債", q: "新株予約権付社債（区分法）。社債部分950,000円、新株予約権部分50,000円、計1,000,000円を当座入金で発行。", debit: [D("当座預金", 1000000)], credit: [D("社債", 950000), D("新株予約権", 50000)], memo: "区分法は社債と新株予約権を分けて計上。負債と純資産に区分する。" },
  { id: "b07", topic: "社債", q: "上記新株予約権（50,000円）が行使され、社債（帳簿950,000円・転換社債型）が株式に転換。全額資本金（当座等の払込なし）。", debit: [D("社債", 950000), D("新株予約権", 50000)], credit: [D("資本金", 1000000)], memo: "転換社債型の権利行使は社債と新株予約権を資本金へ振替。新たな払込みはない。" },
  { id: "b08", topic: "社債", q: "社債発行費40,000円を現金で支払い、繰延資産として処理した。", debit: [D("社債発行費", 40000)], credit: [D("現金", 40000)], memo: "社債発行費は繰延資産に計上できる（任意）。社債の償還期間で償却。" },
  { id: "b09", topic: "社債", q: "決算で社債発行費（繰延資産・当期首残高40,000円）を償還期間5年で1年分償却（直接法）。", debit: [D("社債発行費償却", 8000)], credit: [D("社債発行費", 8000)], memo: "繰延資産は効果の及ぶ期間で償却。40,000÷5=8,000。" },

  // ── 純資産・自己株式（追加） ──
  { id: "n01", topic: "純資産・自己株式", q: "増資。新株を発行し払込額2,000,000円が当座入金。全額を資本金とする。", debit: [D("当座預金", 2000000)], credit: [D("資本金", 2000000)], memo: "原則は払込全額を資本金。準備金にするには「2分の1を超えない額」という制限がある。" },
  { id: "n02", topic: "純資産・自己株式", q: "新株発行。払込額1,000,000円のうち、会社法が認める最低額を資本金、残りを資本準備金とする（当座入金）。", debit: [D("当座預金", 1000000)], credit: [D("資本金", 500000), D("資本準備金", 500000)], memo: "払込額の1/2まで資本準備金にできる。最低限の資本金=半額500,000。" },
  { id: "n03", topic: "純資産・自己株式", q: "株式交付費30,000円を現金で支払い、繰延資産として処理した。", debit: [D("株式交付費", 30000)], credit: [D("現金", 30000)], memo: "新株発行のための費用は株式交付費。繰延資産に計上可（任意）。" },
  { id: "n04", topic: "純資産・自己株式", q: "自己株式を400,000円で取得、当座払い（付随費用なし）。", debit: [D("自己株式", 400000)], credit: [D("当座預金", 400000)], memo: "自己株式は取得原価で純資産のマイナス項目として計上する。" },
  { id: "n05", topic: "純資産・自己株式", q: "自己株式（帳簿400,000円）を450,000円で処分、当座入金。", debit: [D("当座預金", 450000)], credit: [D("自己株式", 400000), D("自己株式処分差益", 50000)], memo: "処分差益は資本取引なので損益でなくその他資本剰余金（処分差益）。" },
  { id: "n06", topic: "純資産・自己株式", q: "自己株式（帳簿400,000円）を350,000円で処分、当座入金（処分差損）。", debit: [D("当座預金", 350000), D("自己株式処分差損", 50000)], credit: [D("自己株式", 400000)], memo: "処分差損もその他資本剰余金の減少として処理。損益にしない。" },
  { id: "n07", topic: "純資産・自己株式", q: "自己株式（帳簿300,000円）を消却した。", debit: [D("その他資本剰余金", 300000)], credit: [D("自己株式", 300000)], memo: "消却はその他資本剰余金を減らして株式を消す。発行済株式数も減る。" },
  { id: "n08", topic: "純資産・自己株式", q: "株主総会で繰越利益剰余金から配当1,000,000円を決議。会社法による利益準備金100,000円を積立て（配当は未払）。", debit: [D("繰越利益剰余金", 1100000)], credit: [D("未払配当金", 1000000), D("利益準備金", 100000)], memo: "配当の1/10を準備金として積立てる（資本準備金＋利益準備金が資本金の1/4に達するまで）。" },
  { id: "n09", topic: "純資産・自己株式", q: "上記の未払配当金1,000,000円を当座預金から支払った。", debit: [D("未払配当金", 1000000)], credit: [D("当座預金", 1000000)], memo: "配当決議時に負債計上した未払配当金を、支払時に消す。" },
  { id: "n10", topic: "純資産・自己株式", q: "資本準備金500,000円を取り崩して繰越利益剰余金の欠損を補填する（計数変動）。", debit: [D("資本準備金", 500000)], credit: [D("繰越利益剰余金", 500000)], memo: "準備金を取り崩して欠損填補。純資産内の振替で総額は不変。" },
  { id: "n11", topic: "純資産・自己株式", q: "新株予約権（帳簿80,000円）が権利行使され、払込500,000円が当座入金。新株を発行し全額資本金とする。", debit: [D("当座預金", 500000), D("新株予約権", 80000)], credit: [D("資本金", 580000)], memo: "権利行使時は払込額＋新株予約権の帳簿価額を資本金へ。" },
  { id: "n12", topic: "純資産・自己株式", q: "発行していた新株予約権（帳簿60,000円）が行使されずに権利行使期間が満了した。", debit: [D("新株予約権", 60000)], credit: [D("新株予約権戻入益", 60000)], memo: "失効した新株予約権は戻入益（特別利益）として収益に振り替える。" },

  // ── 税効果（追加） ──
  { id: "t01", topic: "税効果", q: "棚卸資産評価損の損金不算入額100,000円（将来減算一時差異）。実効税率30%で税効果適用。", debit: [D("繰延税金資産", 30000)], credit: [D("法人税等調整額", 30000)], memo: "将来認められた時に税が減る差異。繰延税金資産100,000×30%=30,000を今計上。" },
  { id: "t02", topic: "税効果", q: "前期計上の繰延税金資産（貸引超過に係る30,000円）について、当期に一時差異が解消した。", debit: [D("法人税等調整額", 30000)], credit: [D("繰延税金資産", 30000)], memo: "差異解消時は資産を取り崩す。調整額が借方=税費用が増える方向。" },
  { id: "t03", topic: "税効果", q: "減価償却超過額200,000円（将来減算）と、その他有価証券評価差益100,000円（将来加算）。実効税率30%で両方を計上（各々別仕訳のうち減価償却分）。", debit: [D("繰延税金資産", 60000)], credit: [D("法人税等調整額", 60000)], memo: "将来減算は繰延税金資産。200,000×30%=60,000。相手は損益（調整額）。" },
  { id: "t04", topic: "税効果", q: "その他有価証券評価差益100,000円（将来加算一時差異）。実効税率30%、純資産直入に対応する税効果。", debit: [D("その他有価証券評価差額金", 30000)], credit: [D("繰延税金負債", 30000)], memo: "将来加算は繰延税金負債。相手も損益でなく純資産（評価差額金）で調整するのがポイント。" },
  { id: "t05", topic: "税効果", q: "賞与引当金繰入の損金不算入額500,000円（将来減算）。実効税率30%。", debit: [D("繰延税金資産", 150000)], credit: [D("法人税等調整額", 150000)], memo: "引当金繰入は税務上、実際支給まで損金にならない＝将来減算。500,000×30%=150,000。" },
  { id: "t06", topic: "税効果", q: "退職給付引当金繰入の損金不算入額600,000円（将来減算）。実効税率30%。", debit: [D("繰延税金資産", 180000)], credit: [D("法人税等調整額", 180000)], memo: "退職給付引当金も支給時まで損金にならず将来減算。600,000×30%=180,000。" },
  { id: "t07", topic: "税効果", q: "繰延税金資産（将来減算分150,000）と繰延税金負債（将来加算分30,000）を相殺し、純額で表示する。", debit: [D("繰延税金負債", 30000)], credit: [D("繰延税金資産", 30000)], memo: "同一納税主体の繰延税金資産・負債は相殺して純額表示する。差引120,000が資産として残る。" },
  { id: "t08", topic: "税効果", q: "圧縮積立金（将来加算一時差異）100,000円に対する税効果（実効税率30%、純資産で調整）。", debit: [D("繰越利益剰余金", 30000)], credit: [D("繰延税金負債", 30000)], memo: "圧縮積立金は将来加算差異。税効果は繰延税金負債を立て、相手は剰余金で調整する。" },

  // ── 連結（基礎・未学習向けに少数） ──

// ============== 状態管理 ==============
const STATE_KEY = "shiwake:state:v1";
const SETTINGS_KEY = "shiwake:settings:v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return { flagged: [], solved: [], custom: [], deleted: [] };
    const p = JSON.parse(raw);
    return { flagged: p.flagged || [], solved: p.solved || [], custom: p.custom || [], deleted: p.deleted || [] };
  } catch { return { flagged: [], solved: [], custom: [], deleted: [] }; }
}
function saveState(state) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); return true; }
  catch { return false; }
}
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}"); }
  catch { return {}; }
}
function saveSettings(s) { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {} }

// cards = SEED + 状態をマージしたもの
function buildCards(state) {
  const fset = new Set(state.flagged), sset = new Set(state.solved), dset = new Set(state.deleted);
  const base = SEED.filter(s => !dset.has(s.id)).map(s => ({ ...s, flagged: fset.has(s.id), solved: sset.has(s.id) }));
  const customs = (state.custom || []).map(c => ({ ...c, flagged: fset.has(c.id), solved: sset.has(c.id) }));
  return [...base, ...customs];
}
function cardsToState(cards) {
  const seedIds = new Set(SEED.map(s => s.id));
  return {
    flagged: cards.filter(c => c.flagged).map(c => c.id),
    solved: cards.filter(c => c.solved).map(c => c.id),
    custom: cards.filter(c => !seedIds.has(c.id)).map(({flagged, solved, ...rest}) => rest),
    deleted: SEED.map(s => s.id).filter(id => !cards.some(c => c.id === id)),
  };
}

// ============== ユーティリティ ==============
const yen = n => n === "" || n == null ? "" : Number(n).toLocaleString();
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function buildAccountOptions(correct) {
  const opts = new Set(correct);
  correct.forEach(acc => {
    const g = ACCOUNT_GROUPS.find(grp => grp.includes(acc));
    if (g) g.forEach(x => opts.add(x));
  });
  const pool = ALL_ACCOUNTS.filter(a => !opts.has(a));
  while (opts.size < 9 && pool.length) opts.add(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  return shuffle(Array.from(opts));
}
function buildAmountOptions(correct) {
  const cset = new Set(correct.map(String));
  const dummies = new Set();
  correct.forEach(a => {
    const n = Number(a);
    [n*10, Math.round(n/10), n+(n>=10000?10000:1000), Math.max(0,n-(n>=10000?10000:1000))].forEach(v => {
      if (v>0 && Number.isFinite(v) && !cset.has(String(v))) dummies.add(String(v));
    });
  });
  const target = Math.max(8, correct.length + 4);
  const need = Math.max(0, target - cset.size);
  const picked = shuffle(Array.from(dummies)).slice(0, need);
  return shuffle([...cset, ...picked]);
}

// ============== グローバル状態 ==============
let state = loadState();
let cards = buildCards(state);
let settings = loadSettings();
let amountSelect = !!settings.amountSelect;
let catFilter = "すべて";
let topicFilter = "すべて";
let onlyFlagged = false;
let onlyUnsolved = false;
let order = [];
let pos = 0;
let graded = false;
let inputDebit = [];
let inputCredit = [];
let pickedNoEntry = false;
let accountOptions = [];
let amountOptions = [];
let saveStatus = "";
let modalContent = null; // null | 'form' | 'backup'
let editing = null;

// ============== ヘルパー ==============
function visibleTopics() {
  return catFilter === "すべて" ? ALL_TOPICS : (TOPIC_GROUPS.find(g => g.cat === catFilter)?.items || []);
}
function applyFilter() {
  const vt = visibleTopics();
  const ids = cards.filter(c =>
    (catFilter === "すべて" || vt.includes(c.topic)) &&
    (topicFilter === "すべて" || c.topic === topicFilter) &&
    (!onlyFlagged || c.flagged) &&
    (!onlyUnsolved || !c.solved)
  ).map(c => c.id);
  order = shuffle(ids);
  pos = 0;
  graded = false;
  loadCurrent();
}
function currentCard() { return cards.find(c => c.id === order[pos]) || null; }
function loadCurrent() {
  const cur = currentCard();
  if (!cur) { inputDebit=[]; inputCredit=[]; accountOptions=[]; amountOptions=[]; return; }
  if (cur.noEntry) {
    inputDebit = [{account:"",amount:""}];
    inputCredit = [{account:"",amount:""}];
  } else {
    inputDebit = cur.debit.map(() => ({account:"",amount:""}));
    inputCredit = cur.credit.map(() => ({account:"",amount:""}));
  }
  pickedNoEntry = false;
  graded = false;
  accountOptions = buildAccountOptions([...cur.debit, ...cur.credit].map(r => r.account));
  amountOptions = buildAmountOptions([...cur.debit, ...cur.credit].map(r => r.amount));
}
function persist() {
  const ok = saveState(cardsToState(cards));
  saveStatus = ok ? "ok" : "ng";
  // 表示更新は呼び出し側で
}
function judge() {
  const cur = currentCard();
  if (cur.noEntry) {
    const empty = [...inputDebit, ...inputCredit].every(r => !r.account && r.amount === "");
    const ok = pickedNoEntry && empty;
    return { dOK: ok, cOK: ok, all: ok };
  }
  const norm = rows => rows.filter(r => r.account && r.amount !== "").map(r => `${r.account}:${Number(r.amount)}`).sort();
  const dOK = JSON.stringify(norm(inputDebit)) === JSON.stringify(norm(cur.debit));
  const cOK = JSON.stringify(norm(inputCredit)) === JSON.stringify(norm(cur.credit));
  return { dOK, cOK, all: dOK && cOK };
}

// ============== レンダリング ==============
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);

      </div>
      <div class="navRow">
        <button class="navBtn" onclick="prev()">← 前へ</button>
        <button class="navBtn" onclick="next()">次へ →</button>
      </div>
      <div class="counter">${pos+1} / ${order.length}</div>
    `;
  } else {
    html += `<div class="empty">この条件の問題がありません。<br>右下の＋から追加するか、フィルタを変えてください。</div>`;
  }

  html += `<button class="fab" onclick="openAdd()">＋</button>`;
  html += renderModal();
  document.getElementById('app').innerHTML = html;
}

function renderTable(cur, result) {
  const n = Math.max(inputDebit.length, inputCredit.length, 1);
  let rows = '';
  for (let i = 0; i < n; i++) {
    rows += '<tr>' + cellHTML('d', i, inputDebit[i], cur.debit, result) + cellHTML('c', i, inputCredit[i], cur.credit, result) + '</tr>';
  }
  return `<table class="entry"><tr><th>借方科目</th><th>金額</th><th>貸方科目</th><th>金額</th></tr>${rows}</table>`;
}

function cellState(r, correctRows) {
  if (!graded) return '';
  const set = correctRows.filter(x => x.account && x.amount !== "").map(x => `${x.account}:${Number(x.amount)}`);
  return (r && r.account && r.amount !== "" && set.includes(`${r.account}:${Number(r.amount)}`)) ? 'ok' : 'ng';
}

function cellHTML(side, i, r, correctRows, result) {
  if (!r) return '<td class="empty"></td><td class="empty"></td>';
  const st = cellState(r, correctRows);
  const dis = graded || pickedNoEntry;
  let accCell, amtCell;
  const opts = ['<option value="">―</option>'].concat(accountOptions.map(o => `<option value="${esc(o)}" ${r.account===o?'selected':''}>${esc(o)}</option>`)).join('');
  accCell = `<td class="${st}"><select ${dis?'disabled':''} onchange="setRow('${side}',${i},'account',this.value)">${opts}</select></td>`;
  if (amountSelect) {
    const aopts = ['<option value="">―</option>'].concat(amountOptions.map(o => `<option value="${esc(o)}" ${r.amount===o?'selected':''}>${esc(yen(o))}</option>`)).join('');
    amtCell = `<td class="${st}"><select ${dis?'disabled':''} onchange="setRow('${side}',${i},'amount',this.value)">${aopts}</select></td>`;
  } else {
    const v = r.amount === "" ? "" : Number(r.amount).toLocaleString();
    amtCell = `<td class="${st}"><input type="text" inputmode="numeric" ${dis?'disabled':''} value="${esc(v)}" placeholder="金額" oninput="setAmt('${side}',${i},this.value)"></td>`;
  }
  return accCell + amtCell;
}

function renderResult(cur, result) {
  let html = `<div class="resultBox ${result.all?'ok':'ng'}">
    <div class="resultHead ${result.all?'ok':'ng'}">${result.all?'✓ 正解！':'✗ 不正解'}</div>`;
  if (cur.noEntry) {
    html += `<div class="ansLabel">正解</div><div class="ansText">仕訳なし</div>`;
  } else {
    if (!result.all) html += `<div style="font-size:13px;color:#cdddee">${!result.dOK?'借方が違います。':''}${!result.cOK?'貸方が違います。':''}</div>`;
    html += `<div class="ansLabel">正解（借方）</div><div class="ansText">${cur.debit.map(r => `${esc(r.account)} ${yen(r.amount)}`).join(' ／ ')}</div>`;
    html += `<div class="ansLabel">正解（貸方）</div><div class="ansText">${cur.credit.map(r => `${esc(r.account)} ${yen(r.amount)}`).join(' ／ ')}</div>`;
  }
  if (cur.memo) html += `<div class="memo">📝 ${esc(cur.memo)}</div>`;
  html += `</div>`;
  return html;
}

// ============== イベントハンドラ ==============
function setCat(c) { catFilter=c; topicFilter='すべて'; applyFilter(); render(); }
function setTopic(t) { topicFilter=t; applyFilter(); render(); }
function toggleFlaggedFilter() { onlyFlagged=!onlyFlagged; applyFilter(); render(); }
function toggleUnsolvedFilter() { onlyUnsolved=!onlyUnsolved; applyFilter(); render(); }
function reshuffleNow() { applyFilter(); render(); }
function toggleAmountSelect() { amountSelect=!amountSelect; saveSettings({amountSelect}); render(); }
function toggleFlag() {
  const cur = currentCard(); if (!cur) return;
  cards = cards.map(c => c.id===cur.id ? {...c,flagged:!c.flagged} : c);
  persist(); render();
}
function next() { pos = (pos+1) % Math.max(order.length,1); loadCurrent(); render(); }
function prev() { pos = (pos-1+order.length) % Math.max(order.length,1); loadCurrent(); render(); }
function setRow(side, i, field, val) {
  const arr = side==='d'?inputDebit:inputCredit;
  arr[i] = { ...arr[i], [field]: val };
  render();
}
function setAmt(side, i, raw) {
  const digits = String(raw).replace(/[^0-9]/g,"");
  const arr = side==='d'?inputDebit:inputCredit;
  arr[i] = { ...arr[i], amount: digits };
  // 入力中は再描画しない（カーソル位置維持）。次の操作で反映される
}
function toggleNoEntry() {
  pickedNoEntry = !pickedNoEntry;
  if (pickedNoEntry) {
    inputDebit = inputDebit.map(() => ({account:"",amount:""}));
    inputCredit = inputCredit.map(() => ({account:"",amount:""}));
  }
  render();
}
function doGrade() {
  // 採点直前に入力欄から最新値を取り込む（入力途中の値を拾うため）
  const inputs = document.querySelectorAll('table.entry input');
  // 行ごとにdebit→creditの順で並んでいる
  let idx = 0;
  const n = Math.max(inputDebit.length, inputCredit.length, 1);
  for (let i = 0; i < n; i++) {
    if (inputDebit[i]) {
      const el = inputs[idx++];
      if (el) { const d = String(el.value).replace(/[^0-9]/g,""); inputDebit[i].amount = d; }
    }
    if (inputCredit[i]) {
      const el = inputs[idx++];
      if (el) { const d = String(el.value).replace(/[^0-9]/g,""); inputCredit[i].amount = d; }
    }
  }
  graded = true;
  const cur = currentCard();
  const r = judge();
  cards = cards.map(c => {
    if (c.id !== cur.id) return c;
    let flagged = c.flagged;
    if (!r.all && !c.flagged) flagged = true;
    if (r.all && c.flagged) flagged = false;
    return { ...c, solved: true, flagged };
  });
  persist();
  render();
}
function openAdd() { editing=null; formState=null; modalContent='form'; render(); }
function openEdit() { editing = currentCard(); formState = JSON.parse(JSON.stringify(editing)); modalContent='form'; render(); }
function openBackup() { modalContent='backup'; render(); }
function closeModal() { modalContent=null; editing=null; formState=null; render(); }
function rerenderForm() { render(); }
function formSetRow(side, i, field, val) {
  formState[side][i] = { ...formState[side][i], [field]: val };
}
function formSetAmt(side, i, raw) {
  const d = String(raw).replace(/[^0-9]/g,"");
  formState[side][i] = { ...formState[side][i], amount: d };
}
function formAddRow(side) { formState[side].push({account:"",amount:""}); render(); }
function formRmRow(side, i) { formState[side] = formState[side].filter((_,idx) => idx!==i); render(); }
function saveForm() {
  const fs = formState;
  if (!fs.q.trim()) { alert('問題文を入力してください'); return; }
  const clean = rows => rows.filter(r => r.account && r.amount !== "").map(r => ({account:r.account, amount:String(Number(r.amount))}));
  const d = fs.noEntry ? [] : clean(fs.debit);
  const c = fs.noEntry ? [] : clean(fs.credit);
  if (!fs.noEntry && (!d.length || !c.length)) { alert('借方・貸方を入力してください'); return; }
  if (editing) {
    cards = cards.map(card => card.id===editing.id ? { ...card, topic:fs.topic, q:fs.q.trim(), noEntry:fs.noEntry, debit:d, credit:c, memo:fs.memo.trim() } : card);
  } else {
    cards.push({ id: 'c'+Date.now(), topic:fs.topic, q:fs.q.trim(), noEntry:fs.noEntry, debit:d, credit:c, memo:fs.memo.trim(), flagged:false, solved:false });
  }
  persist();
  closeModal();
  applyFilter();
  render();
}
function deleteForm() {
  if (!confirm('この問題を削除しますか？')) return;
  cards = cards.filter(c => c.id !== editing.id);
  persist();
  closeModal();
  applyFilter();
  render();
}
function copyBackup(code) {
  // codeはエスケープされてるので一旦DOMから取り直す
  const ta = document.querySelector('.sheet textarea[readonly]');
  if (ta) {
    ta.select();
    try { navigator.clipboard.writeText(ta.value).then(()=>{ alert('コピーしました'); }); }
    catch { document.execCommand('copy'); alert('コピーしました'); }
  }
}
function doImport() {
  const ta = document.getElementById('importText');
  if (!ta) return;
  try {
    const parsed = JSON.parse(ta.value.trim());
    const newState = { flagged: parsed.flagged||[], solved: parsed.solved||[], custom: parsed.custom||[], deleted: parsed.deleted||[] };
    cards = buildCards(newState);
    persist();
    document.getElementById('importMsg').textContent = `復元しました（★${newState.flagged.length}件・解いた${newState.solved.length}件・自作${newState.custom.length}件）`;
    applyFilter();
    render();
    // 再表示後にもメッセージ残すため
    setTimeout(() => { const m = document.getElementById('importMsg'); if (m) m.textContent = `復元しました（★${newState.flagged.length}件・解いた${newState.solved.length}件・自作${newState.custom.length}件）`; }, 50);
  } catch {
    document.getElementById('importMsg').textContent = '読み取れませんでした。文字列が正しいか確認してください。';
  }
}
function resetSolved() {
  if (!confirm('解いた記録をすべてリセットします。よろしいですか？')) return;
  cards = cards.map(c => ({...c, solved:false}));
  persist();
  render();
}

// ============== 初期化 ==============
applyFilter();
render();
</script>
